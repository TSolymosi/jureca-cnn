model_checkpoint:
  _target_: lightning.pytorch.callbacks.ModelCheckpoint
  monitor: val/loss
  mode: min
  save_top_k: 1
  save_last: true
  dirpath: ${outputs_dir}/checkpoints
  filename: "epoch{epoch:02d}-valloss{val/loss:.2f}"

early_stopping:
  _target_: lightning.pytorch.callbacks.EarlyStopping
  monitor: val/loss
  patience: 50
  mode: min

prediction_scatter:
  _target_: src.callbacks.prediction_plot_callback.PredictionPlotCallback
  output_dir: ${outputs_dir}

loss_curves:
  _target_: src.callbacks.loss_curves.LossCurvesCallback
  output_dir: ${outputs_dir}

epoch_time_logger:
  _target_: src.callbacks.epoch_time_logger.EpochTimeLogger

diagnostic_plots:
  _target_: src.callbacks.diagnostic_plot.DiagnosticSpectraCallback
  num_samples: 5
  output_dir: ${outputs_dir}
  use_cauchy_noise: ${data.use_cauchy_noise}

debug:
  _target_: src.callbacks.debug.DataloaderDebugCallback

covariance_heatmap:
  _target_: src.callbacks.covariance_heatmap.CovarianceHeatmapCallback
  param_names: ${data.model_params}
  output_dir: ${outputs_dir}

corner:
  _target_: src.callbacks.corner_plot.CornerPlotPerSampleCallback
  param_names: ${data.model_params}
  output_dir: ${outputs_dir}
  stage: val    # choose one or both
  #num_samples_to_plot: 10   # set e.g. 200 if you want to throttle
  #num_posterior_samples: 5000
  seed: 0

