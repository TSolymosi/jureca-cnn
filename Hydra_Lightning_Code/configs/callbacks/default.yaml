

early_stopping:
  _target_: lightning.pytorch.callbacks.EarlyStopping
  monitor: val/loss
  patience: 100
  mode: min

prediction_scatter:
  _target_: src.callbacks.prediction_plot_callback.PredictionPlotCallback
  output_dir: ${outputs_dir}
  enable_parameter_space_diagnostics: true      # Enable diagnostics
  diagnostic_target_params: ['p', 'Tlow']       # Only these params
  diagnostic_plot_every_n_epochs: 10             # Every 10 epochs



loss_curves:
  _target_: src.callbacks.loss_curves.LossCurvesCallback
  output_dir: ${outputs_dir}

epoch_time_logger:
  _target_: src.callbacks.epoch_time_logger.EpochTimeLogger

diagnostic_plot:
  _target_: src.callbacks.diagnostic_plot.DiagnosticSpectraCallback
  num_samples: 5
  output_dir: ${outputs_dir}
  # Pass all the required noise parameters
  use_cauchy_noise: ${data.use_cauchy_noise}
  cauchy_mu: ${data.cauchy_mu}
  cauchy_sigma: ${data.cauchy_sigma}
  cauchy_threshold: ${data.cauchy_threshold}


corner_plots:
  _target_: src.callbacks.hybrid_corner_plot_callback.HybridCornerPlotCallback
  param_names: ${data.model_params}
  log_scale_params: ${data.log_scale_params}
  output_dir: "${outputs_dir}/corner_plots"
  plot_every_n_epochs: 5
  num_samples_to_plot: 10
  num_posterior_samples: 5000
  plot_in_physical_space: true  # ← Set to true for physical space (default)
  seed: 42


calibration_check:
  _target_: src.callbacks.calibration_check_callback.CalibrationCheckCallback
  model_params: ${data.model_params}
  log_scale_params: ${data.log_scale_params}
  output_dir: "${outputs_dir}/calibration_check"
  check_every_n_epochs: 5  # Check every 5 epochs

model_checkpoint:
  _target_: lightning.pytorch.callbacks.ModelCheckpoint
  dirpath: "${outputs_dir}/checkpoints"  # Uses Hydra's output path
  filename: "epoch_{epoch:03d}-val_loss_{val/loss:.4f}"
  monitor: "val/loss"
  mode: "min"
  save_last: true  # Critical: saves 'last.ckpt' for easy resume
  save_top_k: 3    # Keep best 3 checkpoints
  every_n_epochs: 1  # Save every epoch (or increase to save less often)
  verbose: true
  auto_insert_metric_name: false


